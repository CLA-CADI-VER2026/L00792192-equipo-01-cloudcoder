openapi: 3.0.3
info:
  title: API Directorio - Materias y Docentes
  description: API REST con operaciones CRUD completas para gestionar materias y docentes del directorio académico.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api/v1
    description: Servidor de desarrollo local

tags:
  - name: Materias
    description: Operaciones sobre la tabla de materias
  - name: Docentes
    description: Operaciones sobre la tabla de docentes

paths:
  # ---------------------------------------------------------------------------
  # ENDPOINTS: MATERIAS
  # ---------------------------------------------------------------------------
  /materias:
    get:
      tags:
        - Materias
      summary: Obtener todas las materias
      responses:
        '200':
          description: Lista de materias obtenida con éxito
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Materia'
              example:
                - id: 1
                  clave: "TC1028"
                  nombre: "Programación en Python"
                  creditos: 5
                - id: 2
                  clave: "TC1004B"
                  nombre: "Implementación de IoT"
                  creditos: 4
        '500':
          $ref: '#/components/responses/Error500'

    post:
      tags:
        - Materias
      summary: Crear una nueva materia
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MateriaInput'
            example:
              clave: "TC2005B"
              nombre: "Construcción de Software"
              creditos: 5
      responses:
        '201':
          description: Materia creada con éxito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Materia'
              example:
                id: 3
                clave: "TC2005B"
                nombre: "Construcción de Software"
                creditos: 5
        '400':
          $ref: '#/components/responses/Error400'
        '500':
          $ref: '#/components/responses/Error500'

  /materias/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID de la materia
        schema:
          type: integer
          example: 1

    get:
      tags:
        - Materias
      summary: Obtener una materia por su ID
      responses:
        '200':
          description: Materia encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Materia'
              example:
                id: 1
                clave: "TC1028"
                nombre: "Programación en Python"
                creditos: 5
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'

    put:
      tags:
        - Materias
      summary: Actualizar una materia existente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MateriaInput'
            example:
              clave: "TC1028"
              nombre: "Programación en Python (Actualizado)"
              creditos: 6
      responses:
        '200':
          description: Materia actualizada con éxito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Materia'
              example:
                id: 1
                clave: "TC1028"
                nombre: "Programación en Python (Actualizado)"
                creditos: 6
        '400':
          $ref: '#/components/responses/Error400'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'

    delete:
      tags:
        - Materias
      summary: Eliminar una materia por su ID
      responses:
        '204':
          description: Materia eliminada con éxito (sin contenido)
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'

  # ---------------------------------------------------------------------------
  # ENDPOINTS: DOCENTES
  # ---------------------------------------------------------------------------
  /docentes:
    get:
      tags:
        - Docentes
      summary: Obtener todos los docentes
      responses:
        '200':
          description: Lista de docentes obtenida con éxito
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Docente'
              example:
                - id: 1
                  nombre: "Laura Martínez"
                  email: "laura.martinez@tec.mx"
                  materia_id: 1
                - id: 2
                  nombre: "Carlos Ríos"
                  email: "carlos.rios@tec.mx"
                  materia_id: 2
        '500':
          $ref: '#/components/responses/Error500'

    post:
      tags:
        - Docentes
      summary: Crear un nuevo docente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocenteInput'
            example:
              nombre: "Laura Martínez"
              email: "laura.martinez@tec.mx"
              materia_id: 1
      responses:
        '201':
          description: Docente creado con éxito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Docente'
              example:
                id: 1
                nombre: "Laura Martínez"
                email: "laura.martinez@tec.mx"
                materia_id: 1
        '400':
          $ref: '#/components/responses/Error400'
        '500':
          $ref: '#/components/responses/Error500'

  /docentes/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID del docente
        schema:
          type: integer
          example: 1

    get:
      tags:
        - Docentes
      summary: Obtener un docente por su ID
      responses:
        '200':
          description: Docente encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Docente'
              example:
                id: 1
                nombre: "Laura Martínez"
                email: "laura.martinez@tec.mx"
                materia_id: 1
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'

    put:
      tags:
        - Docentes
      summary: Actualizar un docente existente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocenteInput'
            example:
              nombre: "Laura Martínez Ramos"
              email: "laura.martinez@tec.mx"
              materia_id: 3
      responses:
        '200':
          description: Docente actualizado con éxito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Docente'
              example:
                id: 1
                nombre: "Laura Martínez Ramos"
                email: "laura.martinez@tec.mx"
                materia_id: 3
        '400':
          $ref: '#/components/responses/Error400'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'

    delete:
      tags:
        - Docentes
      summary: Eliminar un docente por su ID
      responses:
        '204':
          description: Docente eliminado con éxito (sin contenido)
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'

# -----------------------------------------------------------------------------
# COMPONENTES REUTILIZABLES
# -----------------------------------------------------------------------------
components:
  schemas:
    # --- Schema de Error general ---
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Código interno del error
        message:
          type: string
          description: Mensaje legible que describe el error

    # --- Schemas: Materias ---
    MateriaInput:
      type: object
      required:
        - clave
        - nombre
      properties:
        clave:
          type: string
          maxLength: 20
          description: Clave única de la materia (ej. TC1028)
        nombre:
          type: string
          maxLength: 100
          description: Nombre completo de la materia
        creditos:
          type: integer
          nullable: true
          description: Número de créditos de la materia

    Materia:
      allOf:
        - type: object
          required:
            - id
          properties:
            id:
              type: integer
              description: Identificador único autogenerado
        - $ref: '#/components/schemas/MateriaInput'
      example:
        id: 1
        clave: "TC1028"
        nombre: "Programación en Python"
        creditos: 5

    # --- Schemas: Docentes ---
    DocenteInput:
      type: object
      required:
        - nombre
        - email
      properties:
        nombre:
          type: string
          maxLength: 100
          description: Nombre completo del docente
        email:
          type: string
          format: email
          maxLength: 100
          description: Correo electrónico único del docente
        materia_id:
          type: integer
          nullable: true
          description: ID de la materia asignada al docente (FK a materias.id)

    Docente:
      allOf:
        - type: object
          required:
            - id
          properties:
            id:
              type: integer
              description: Identificador único autogenerado
        - $ref: '#/components/schemas/DocenteInput'
      example:
        id: 1
        nombre: "Laura Martínez"
        email: "laura.martinez@tec.mx"
        materia_id: 1

  # --- Respuestas de error reutilizables ---
  responses:
    Error400:
      description: Solicitud incorrecta o datos de entrada inválidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: "BAD_REQUEST"
            message: "Faltan campos obligatorios o los datos enviados no son válidos."

    Error404:
      description: El recurso solicitado no fue encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: "NOT_FOUND"
            message: "El recurso con el ID proporcionado no existe."

    Error500:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: "INTERNAL_SERVER_ERROR"
            message: "Ocurrió un error inesperado al procesar la solicitud."
